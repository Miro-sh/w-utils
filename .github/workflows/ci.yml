name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --release

      - name: Build release
        run: cargo build --release
