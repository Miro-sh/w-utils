name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # Intel Mac binaries are cross-compiled on the ARM runner:
          # macos-13 (Intel) runners are retired and jobs queue forever.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        # rust-lld lets us cross-compile the musl targets with no C toolchain.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate man page
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          "./target/${{ matrix.target }}/release/wcp" --generate-man > wcp.1
          gzip -9 wcp.1

      - name: Build .deb and .rpm packages
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cargo install cargo-deb cargo-generate-rpm --locked
          cargo deb --target ${{ matrix.target }} --no-build \
            -o wcp-${{ matrix.target }}.deb
          cargo generate-rpm -o wcp-${{ matrix.target }}.rpm

      - name: Package (Linux and macOS)
        if: runner.os != 'Windows'
        run: |
          name="wcp-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/wcp" README.md LICENSE "$name/"
          # La page man n'est générée que pour la cible Linux x86_64.
          [ -f wcp.1.gz ] && cp wcp.1.gz "$name/" || true
          tar -czf "$name.tar.gz" "$name"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $name = "wcp-$env:TARGET"
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          Copy-Item "target/$env:TARGET/release/wcp.exe", "README.md", "LICENSE" $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wcp-*.tar.gz
            wcp-*.zip
            wcp-*.deb
            wcp-*.rpm
          generate_release_notes: true
