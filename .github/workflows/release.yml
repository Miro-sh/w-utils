name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # Intel Mac binaries are cross-compiled on the ARM runner:
          # macos-13 (Intel) runners are retired and jobs queue forever.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        # rust-lld lets us cross-compile the musl targets with no C toolchain.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux and macOS)
        if: runner.os != 'Windows'
        run: |
          name="bcp-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/bcp" README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $name = "bcp-$env:TARGET"
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          Copy-Item "target/$env:TARGET/release/bcp.exe", "README.md", "LICENSE" $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bcp-*.tar.gz
            bcp-*.zip
          generate_release_notes: true
