name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # La release est créée une seule fois, AVANT les builds : sinon les jobs de
  # la matrice se battent pour la créer et un perdant échoue (already_exists).
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # Intel Mac binaries are cross-compiled on the ARM runner:
          # macos-13 (Intel) runners are retired and jobs queue forever.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        # rust-lld lets us cross-compile the musl targets with no C toolchain.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate man page
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          "./target/${{ matrix.target }}/release/wcp" --generate-man > wcp.1
          gzip -9 wcp.1

      - name: Generate shell completions
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          mkdir -p completions
          "./target/${{ matrix.target }}/release/wcp" --generate-completions bash > completions/wcp.bash
          "./target/${{ matrix.target }}/release/wcp" --generate-completions zsh > completions/_wcp
          "./target/${{ matrix.target }}/release/wcp" --generate-completions fish > completions/wcp.fish

      - name: Build .deb and .rpm packages
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cargo install cargo-deb cargo-generate-rpm --locked
          cargo deb --target ${{ matrix.target }} --no-build \
            -o w-utils-${{ matrix.target }}.deb
          cargo generate-rpm -o w-utils-${{ matrix.target }}.rpm

      - name: Package (Linux and macOS)
        if: runner.os != 'Windows'
        run: |
          name="w-utils-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/wcp" README.md LICENSE "$name/"
          # La page man et les complétions ne sont générées que pour Linux x86_64.
          [ -f wcp.1.gz ] && cp wcp.1.gz "$name/" || true
          [ -d completions ] && cp -r completions "$name/" || true
          tar -czf "$name.tar.gz" "$name"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $name = "w-utils-$env:TARGET"
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          Copy-Item "target/$env:TARGET/release/wcp.exe", "README.md", "LICENSE" $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            w-utils-*.tar.gz
            w-utils-*.zip
            w-utils-*.deb
            w-utils-*.rpm

  # Un seul SHA256SUMS.txt couvrant tous les assets, produit une fois les
  # builds terminés (vérifiable avec : sha256sum -c SHA256SUMS.txt).
  checksums:
    name: SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate checksums for all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$GITHUB_REF_NAME" --repo ${{ github.repository }} --pattern "w-utils-*" --dir assets
          cd assets && sha256sum w-utils-* > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: assets/SHA256SUMS.txt

  # --- Canaux de distribution externes -------------------------------------
  # Tous dormants par défaut : ils ne tournent que si la variable de repo
  # correspondante vaut 'true'. Voir packaging/README.md pour l'activation.

  homebrew:
    name: Homebrew tap
    needs: checksums
    if: vars.HOMEBREW_TAP_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: script/update-homebrew-tap.sh

  aur:
    name: AUR (w-utils-bin)
    needs: checksums
    if: vars.AUR_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: script/publish-aur.sh

  crates:
    name: crates.io
    needs: build
    if: vars.CRATES_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
