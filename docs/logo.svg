<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262637"/>
      <stop offset="1" stop-color="#111119"/>
    </linearGradient>
    <linearGradient id="wfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd9c2"/>
    </linearGradient>
  </defs>

  <!-- iOS-style rounded square -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Rust gear watermark (dashed-circle trick for the teeth) -->
  <g opacity="0.28" stroke="#e8590c" fill="none">
    <circle cx="512" cy="512" r="356" stroke-width="104" stroke-dasharray="93 93"/>
    <circle cx="512" cy="512" r="298" stroke-width="34"/>
    <circle cx="512" cy="512" r="96" stroke-width="34"/>
  </g>

  <!-- the letter -->
  <text x="512" y="668" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif" font-weight="bold"
        font-size="480" fill="url(#wfill)">w</text>
</svg>
